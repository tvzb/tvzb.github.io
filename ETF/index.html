<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ETF策略复盘看板</title>
    <style>
        /* 现代高对比度专业量化金融调色盘 */
        :root {
            --bg-page: #f8fafc;
            --bg-panel: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --sidebar-width: 260px;
            --header-height: 56px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-page);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ==========================================================================
           桌面端侧边栏布局 (PC/平板横屏)
           ========================================================================== */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            flex-shrink: 0;
        }

        .sidebar-header {
            height: var(--header-height);
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 16px;
            font-weight: 800;
            border-bottom: 1px solid var(--border);
            letter-spacing: 0.5px;
        }

        .nav-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 15px 12px;
        }

        .nav-item {
            width: 100%;
            background: none;
            border: none;
            padding: 12px 14px;
            text-align: left;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.15s ease;
        }

        .nav-item:hover {
            background: #f1f5f9;
        }

        .nav-item.active {
            background: var(--accent-light);
            color: var(--accent);
        }

        .year-group {
            margin-top: 20px;
            border-top: 1px dashed var(--border);
            padding-top: 15px;
        }

        .year-label {
            padding: 0 14px 8px 14px;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .month-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding: 4px 6px;
        }

        .month-grid-btn {
            background: #f8fafc;
            border: 1px solid var(--border);
            padding: 9px;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.15s ease;
        }

        .month-grid-btn:hover {
            background: #e2e8f0;
            border-color: #cbd5e1;
        }

        .month-grid-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
        }

        /* ==========================================================================
           主内容区结构
           ========================================================================== */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-page);
        }

        /* 顶部状态条 */
        .top-bar {
            height: var(--header-height);
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
        }

        .view-title {
            font-size: 16px;
            font-weight: 800;
            color: var(--text-main);
        }

        .record-count {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            background: #f1f5f9;
            padding: 5px 12px;
            border-radius: 20px;
        }

        /* ==========================================================================
           手机端专属横向滚动导航条 (替代冗余大按钮和多级折叠)
           ========================================================================== */
        #mobile-nav-bar {
            display: none;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 10px 14px;
            overflow-x: auto;
            white-space: nowrap;
            gap: 8px;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }

        #mobile-nav-bar::-webkit-scrollbar {
            display: none; /* 隐藏原生滚动条 */
        }

        .m-nav-btn {
            display: inline-block;
            padding: 7px 15px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 20px;
            background: #f1f5f9;
            color: var(--text-main);
            border: 1px solid transparent;
            cursor: pointer;
            margin-right: 6px;
            transition: all 0.15s ease;
        }

        .m-nav-btn.active {
            background: var(--accent);
            color: #ffffff;
        }

        /* ==========================================================================
           高密度数据表格组件 (带双列双向冻结锁定)
           ========================================================================== */
        .table-container {
            flex: 1;
            overflow: auto;
            position: relative;
            background: var(--bg-panel);
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            min-width: 720px; 
        }

        /* 表头基础样式 */
        thead th {
            position: sticky;
            top: 0;
            z-index: 20;
            background: #f8fafc;
            color: var(--text-muted);
            font-weight: 800;
            font-size: 13px;
            text-align: center;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
        }

        /* 数据单元格基础样式 */
        tbody td {
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            background: var(--bg-panel);
            text-align: center;
            vertical-align: middle;
        }

        tbody tr:hover td {
            background: #f8fafc;
        }

        /* 核心实现：前两列(时间、标的)双向固定锁定 */
        th.sticky-col-1, td.sticky-col-1 {
            position: sticky;
            left: 0;
            z-index: 10;
            width: 105px;
            min-width: 105px;
            max-width: 105px;
            text-align: left;
            background: var(--bg-panel);
        }

        th.sticky-col-2, td.sticky-col-2 {
            position: sticky;
            left: 105px;
            z-index: 10;
            width: 145px;
            min-width: 145px;
            max-width: 145px;
            text-align: left;
            background: var(--bg-panel);
            box-shadow: 4px 0 8px -4px rgba(0, 0, 0, 0.15);
            border-right: 1px solid var(--border);
        }

        /* Hover时锁定列背景色同步 */
        tbody tr:hover td.sticky-col-1,
        tbody tr:hover td.sticky-col-2 {
            background: #f8fafc;
        }

        /* 表头交汇处层级最高，防止层级错乱 */
        thead th.sticky-col-1 { z-index: 30; background: #f8fafc; }
        thead th.sticky-col-2 { 
            z-index: 30; 
            background: #f8fafc;
            box-shadow: 4px 0 8px -4px rgba(0, 0, 0, 0.15);
            border-right: 1px solid var(--border);
        }

        /* 数据细节美化 */
        .time-text {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .symbol-text {
            color: var(--text-main);
            font-weight: 800;
            word-break: break-all;
            white-space: normal;
            line-height: 1.4;
        }

        .signal-badge {
            display: inline-block;
            font-size: 13px;
            line-height: 1.4;
            white-space: nowrap;
        }

        .empty-signal {
            color: #cbd5e1;
            font-weight: 400;
        }

        .loading, .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 14px;
        }

        /* ==========================================================================
           自适应移动端与平板优化 (Breakpoint: 768px)
           ========================================================================= */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            #sidebar {
                display: none; /* 完全隐藏桌面侧边栏 */
            }

            #mobile-nav-bar {
                display: flex; /* 唤醒顶部横向滚动快捷菜单 */
            }

            .top-bar {
                padding: 0 14px;
                height: 48px;
            }

            .view-title {
                font-size: 15px;
            }

            tbody td, thead th {
                padding: 10px 8px;
            }

            /* 手机屏幕压缩：精简锁定列宽度，释放右侧视口盲区 */
            th.sticky-col-1, td.sticky-col-1 {
                width: 92px;
                min-width: 92px;
                max-width: 92px;
                padding-left: 6px;
            }
            th.sticky-col-2, td.sticky-col-2 {
                left: 92px;
                width: 120px;
                min-width: 120px;
                max-width: 120px;
                padding-left: 6px;
                box-shadow: 3px 0 6px -3px rgba(0, 0, 0, 0.15);
            }
            thead th.sticky-col-2 {
                left: 92px;
            }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">📈 ETF策略看板</div>
        <div class="nav-scroll">
            <button class="nav-item active" id="d-btn-latest" onclick="showLatestLive()">
                <span>⚡</span> 最新 300 条记录
            </button>
            <div id="nav-container"></div>
        </div>
    </div>

    <div id="main">
        <div id="mobile-nav-bar"></div>

        <div class="top-bar">
            <div class="view-title" id="view-title-text">最新 300 条策略信号</div>
            <div class="record-count" id="record-count">共 0 条记录</div>
        </div>

        <div class="table-container" id="table-container">
            <div id="content-container"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://etf.hahagw.eu.org";
        
        let rawDataArray = [];
        let parsedDataList = []; 
        let globalDataTree = {}; 

        // 深度解析器
        function parseSignalRecord(item) {
            let record = {
                original_time: item.bj_time,
                display_time: item.bj_time.length > 11 ? item.bj_time.substring(5) : item.bj_time,
                symbol: "未知标的",
                signals: { 'am': '', 'pm': '', '1D': '', '1W': '' }
            };

            let cleanText = item.signal_text.replace(/🔔/g, '').trim();
            if (cleanText.includes(':')) {
                let parts = cleanText.split(':');
                record.symbol = parts[0].trim();
                
                let m = record.symbol.match(/\d{6}\([^)]+\)/g);
                if (m && m.length > 0) record.symbol = m[m.length - 1];

                let indicators = parts[1].split('|');
                indicators.forEach(ind => {
                    ind = ind.trim();
                    if (ind.startsWith('am')) record.signals['am'] = ind.replace('am', '').trim();
                    else if (ind.startsWith('pm')) record.signals['pm'] = ind.replace('pm', '').trim();
                    else if (ind.startsWith('1D')) record.signals['1D'] = ind.replace('1D', '').trim();
                    else if (ind.startsWith('1W')) record.signals['1W'] = ind.replace('1W', '').trim();
                });
            } else {
                record.symbol = cleanText;
            }
            return record;
        }

        async function init() {
            document.getElementById('content-container').innerHTML = '<div class="loading">正在获取最新策略数据... ⏳</div>';
            try {
                const res = await fetch(API_URL);
                rawDataArray = await res.json();
                
                parsedDataList = rawDataArray.map(parseSignalRecord);
                
                processDataTree();
                renderSidebar();
                renderMobileNav();
                
                showLatestLive();
            } catch (e) {
                document.getElementById('content-container').innerHTML = 
                    `<div class="loading" style="color:#ef4444">数据同步失败: ${e.message}<br><br>请检查网络或稍后刷新重试</div>`;
            }
        }

        // 构建时间序列索引树
        function processDataTree() {
            globalDataTree = {};
            parsedDataList.forEach(item => {
                const [datePart] = item.original_time.split(' ');
                if(!datePart) return;
                const [y, m] = datePart.split('-');
                if (!globalDataTree[y]) globalDataTree[y] = {};
                if (!globalDataTree[y][m]) globalDataTree[y][m] = [];
                globalDataTree[y][m].push(item);
            });
        }

        // 统一导航同步控制器
        function updateNavUI(mode, year, month) {
            document.querySelectorAll('.nav-item, .month-grid-btn, .m-nav-btn').forEach(el => el.classList.remove('active'));

            if (mode === 'LATEST') {
                const dLatest = document.getElementById('d-btn-latest');
                if (dLatest) dLatest.classList.add('active');
                const mLatest = document.getElementById('m-btn-latest');
                if (mLatest) mLatest.classList.add('active');
                document.getElementById('view-title-text').innerText = '最新 300 条策略信号';
            } else {
                const dMonthBtn = document.getElementById(`d-btn-${year}-${month}`);
                if (dMonthBtn) dMonthBtn.classList.add('active');
                
                const mMonthBtn = document.getElementById(`m-btn-${year}-${month}`);
                if (mMonthBtn) mMonthBtn.classList.add('active');

                document.getElementById('view-title-text').innerText = `${year}年 ${parseInt(month)}月 历史存档`;
            }
        }

        window.showLatestLive = function() {
            const data = parsedDataList.slice(0, 300);
            updateNavUI('LATEST');
            renderTable(data);
        }

        window.renderMonthHistory = function(year, month) {
            const data = globalDataTree[year][month] || [];
            updateNavUI('MONTH', year, month);
            renderTable(data);
        }

        // 高密度双锁定渲染引擎
        function renderTable(dataArray) {
            const container = document.getElementById('content-container');
            if (dataArray.length === 0) {
                container.innerHTML = '<div class="empty-state">当前时段内暂无策略信号记录 💨</div>';
                document.getElementById('record-count').innerText = `共 0 条记录`;
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th class="sticky-col-1">时间(日/时)</th>
                            <th class="sticky-col-2">标的名称</th>
                            <th>上午</th>
                            <th>下午</th>
                            <th>今日</th>
                            <th>本周</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            dataArray.forEach(row => {
                const s = row.signals;
                html += `
                    <tr>
                        <td class="sticky-col-1"><span class="time-text">${row.display_time}</span></td>
                        <td class="sticky-col-2"><span class="symbol-text">${row.symbol}</span></td>
                        <td>${s['am'] ? `<span class="signal-badge">${s['am']}</span>` : '<span class="empty-signal">-</span>'}</td>
                        <td>${s['pm'] ? `<span class="signal-badge">${s['pm']}</span>` : '<span class="empty-signal">-</span>'}</td>
                        <td>${s['1D'] ? `<span class="signal-badge">${s['1D']}</span>` : '<span class="empty-signal">-</span>'}</td>
                        <td>${s['1W'] ? `<span class="signal-badge">${s['1W']}</span>` : '<span class="empty-signal">-</span>'}</td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
            document.getElementById('record-count').innerText = `共 ${dataArray.length} 条记录`;
            
            // 每次视口切换，滚动位置回归原点
            document.getElementById('table-container').scrollTop = 0;
            document.getElementById('table-container').scrollLeft = 0;
        }

        // PC端侧边栏月度网格生成
        function renderSidebar() {
            const container = document.getElementById('nav-container');
            container.innerHTML = '';
            
            const years = Object.keys(globalDataTree).sort().reverse();
            years.forEach(y => {
                const yearGroup = document.createElement('div');
                yearGroup.className = 'year-group';
                
                const yearLabel = document.createElement('div');
                yearLabel.className = 'year-label';
                yearLabel.innerText = `📂 ${y} 年`;
                yearGroup.appendChild(yearLabel);
                
                const monthGrid = document.createElement('div');
                monthGrid.className = 'month-grid';
                
                const months = Object.keys(globalDataTree[y]).sort((a, b) => b - a);
                months.forEach(m => {
                    const mBtn = document.createElement('button');
                    mBtn.className = 'month-grid-btn';
                    mBtn.id = `d-btn-${y}-${m}`;
                    mBtn.innerText = `${parseInt(m)} 月`;
                    mBtn.onclick = () => renderMonthHistory(y, m);
                    monthGrid.appendChild(mBtn);
                });
                
                yearGroup.appendChild(monthGrid);
                container.appendChild(yearGroup);
            });
        }

        // 手机端滑块快捷菜单动态生成
        function renderMobileNav() {
            const container = document.getElementById('mobile-nav-bar');
            container.innerHTML = '';

            const latestBtn = document.createElement('button');
            latestBtn.className = 'm-nav-btn active';
            latestBtn.id = 'm-btn-latest';
            latestBtn.innerText = '最新记录';
            latestBtn.onclick = () => showLatestLive();
            container.appendChild(latestBtn);

            const years = Object.keys(globalDataTree).sort().reverse();
            years.forEach(y => {
                const months = Object.keys(globalDataTree[y]).sort((a, b) => b - a);
                months.forEach(m => {
                    const mBtn = document.createElement('button');
                    mBtn.className = 'm-nav-btn';
                    mBtn.id = `m-btn-${y}-${m}`;
                    const shortYear = y.toString().substring(2);
                    mBtn.innerText = `${shortYear}年${parseInt(m)}月`;
                    mBtn.onclick = () => renderMonthHistory(y, m);
                    container.appendChild(mBtn);
                });
            });
        }

        init();
    </script>
</body>
</html>
