<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股ETF阈值监控看板</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        /* 5天交易日 + 1天周统计 = 6列布局 */
        .calendar-grid {
            grid-template-columns: repeat(6, minmax(0, 1fr));
        }
        [v-cloak] { display: none; }
        
        /* 隐藏滚动条但保留滚动功能，让表格更清爽 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div id="app" v-cloak>
        <header class="bg-slate-800 text-white shadow-md sticky top-0 z-50">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <h1 class="text-lg font-bold flex items-center gap-2">
                    <i class="fa-solid fa-chart-line text-emerald-400"></i> ETF阈值监控系统
                </h1>
                <span class="text-xs bg-emerald-600 px-2 py-1 rounded font-mono animate-pulse">● LIVE同步中</span>
            </div>
        </header>

        <main class="container mx-auto px-2 md:px-4 py-4 md:py-6 max-w-5xl">
            
            <div class="flex bg-white p-1 rounded-lg shadow-sm mb-4 md:mb-6 max-w-md mx-auto border border-gray-200">
                <button @click="currentView = 'date'" :class="currentView === 'date' ? 'bg-blue-600 text-white shadow' : 'text-gray-600 hover:text-blue-600'" class="flex-1 py-2 text-center rounded-md font-medium text-sm transition-all">
                    <i class="fa-solid fa-list-ul mr-1"></i> 按日期排列
                </button>
                <button @click="currentView = 'etf'" :class="currentView === 'etf' ? 'bg-blue-600 text-white shadow' : 'text-gray-600 hover:text-blue-600'" class="flex-1 py-2 text-center rounded-md font-medium text-sm transition-all">
                    <i class="fa-regular fa-calendar-days mr-1"></i> 按ETF日历
                </button>
            </div>

            <div v-if="loading" class="text-center py-12 text-gray-500">
                <i class="fa-solid fa-spinner animate-spin mr-2"></i> 正在读取最新数据...
            </div>

            <div v-else>
                <!-- 视图 1：按日期查询 (优化手机端表格化、固定表头、多维排序) -->
                <section v-if="currentView === 'date'" class="space-y-3">
                    <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex gap-4 items-center">
                        <div class="flex-1 w-full">
                            <select v-model="selectedDate" class="w-full border border-gray-300 rounded-lg px-3 py-2 bg-gray-50 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="latest">🔥 默认展示：最新200条触发记录</option>
                                <option v-for="date in uniqueDates" :key="date" :value="date">
                                    📅 指定日期：{{ date }}
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden relative max-h-[75vh]">
                        <div class="overflow-x-auto no-scrollbar max-h-[75vh]">
                            <table class="w-full text-center border-collapse whitespace-nowrap">
                                <thead class="sticky top-0 bg-slate-100 shadow-sm z-20">
                                    <tr class="text-sm font-bold text-slate-700">
                                        <th class="p-3 text-left sticky left-0 bg-slate-100 z-30 shadow-[1px_0_0_0_#e2e8f0]">ETF名称</th>
                                        <th class="p-3">上午</th>
                                        <th class="p-3">下午</th>
                                        <th class="p-3">全天</th>
                                        <th class="p-3">本周</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100 text-[15px]">
                                    <tr v-for="item in filteredDateData" :key="item.etf_code + item.date" class="hover:bg-blue-50/50 transition-colors">
                                        <td class="p-3 font-bold text-gray-800 text-left sticky left-0 bg-white shadow-[1px_0_0_0_#f3f4f6] z-10">
                                            <div class="flex flex-col">
                                                <span>{{ item.etf_name }}</span>
                                                <div class="flex items-center gap-2 mt-0.5">
                                                    <span class="text-xs text-gray-400 font-normal">{{ item.etf_code }}</span>
                                                    <!-- 在展示前200条时，显示具体日期以便区分 -->
                                                    <span v-if="selectedDate === 'latest'" class="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded">
                                                        {{ item.date.slice(5) }}
                                                    </span>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="p-3 font-semibold" :class="getColorClass(item.am_status)">{{ item.am_status || '-' }}</td>
                                        <td class="p-3 font-semibold" :class="getColorClass(item.pm_status)">{{ item.pm_status || '-' }}</td>
                                        <td class="p-3 font-semibold" :class="getColorClass(item.day_status)">{{ item.day_status || '-' }}</td>
                                        <td class="p-3 font-semibold" :class="getColorClass(item.week_status)">{{ item.week_status || '-' }}</td>
                                    </tr>
                                    <tr v-if="filteredDateData.length === 0">
                                        <td colspan="5" class="p-8 text-center text-gray-400">当前筛选条件下无触发记录</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <!-- 视图 2：按 ETF 查询 (加大字体、默认选择最热ETF) -->
                <section v-if="currentView === 'etf'" class="space-y-3">
                    <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex flex-col sm:flex-row gap-3 items-center">
                        <div class="flex-1 w-full">
                            <select v-model="selectedEtf" class="w-full border border-gray-300 rounded-lg px-3 py-2 bg-gray-50 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option v-for="code in uniqueEtfCodes" :key="code" :value="code">
                                    {{ getEtfName(code) }} ({{ code }})
                                </option>
                            </select>
                        </div>
                        <div class="w-full sm:w-auto">
                            <input type="month" v-model="selectedMonth" class="w-full border border-gray-300 rounded-lg px-3 py-2 bg-gray-50 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="grid calendar-grid bg-slate-100 border-b border-slate-200 text-center py-2 text-sm font-bold text-slate-700">
                            <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div>
                            <div class="text-blue-700 bg-blue-50/80">📊本周</div>
                        </div>
                        
                        <div class="grid calendar-grid md:auto-rows-[110px] auto-rows-[90px] divide-x divide-y divide-gray-100">
                            <template v-for="(week, wIndex) in calendarWeeks" :key="wIndex">
                                <div v-for="(day, dIndex) in week.days" :key="dIndex" 
                                     :class="['p-1.5 flex flex-col hover:bg-gray-50 cursor-pointer text-center relative', day.hasTrigger ? 'bg-red-50/20' : '']">
                                    
                                    <!-- 日历上的号数 -->
                                    <span class="text-xs font-bold block text-left absolute top-1 left-1.5" :class="day.date ? 'text-gray-700' : 'text-gray-300'">
                                        {{ day.dayNum }}
                                    </span>
                                    
                                    <!-- 放大数据字体，优化间距 -->
                                    <div v-if="day.date" class="mt-4 text-[13px] md:text-[15px] font-bold leading-tight space-y-1 w-full">
                                        <div v-if="day.data.am_status" :class="getColorClass(day.data.am_status)">上:{{ day.data.am_status }}</div>
                                        <div v-if="day.data.pm_status" :class="getColorClass(day.data.pm_status)">下:{{ day.data.pm_status }}</div>
                                        <div v-if="day.data.day_status" :class="getColorClass(day.data.day_status)">全:{{ day.data.day_status }}</div>
                                    </div>
                                </div>

                                <div class="p-1.5 bg-blue-50/30 flex flex-col justify-center items-center text-center border-l border-l-blue-100">
                                    <span v-if="week.weekTrigger" class="text-[14px] md:text-[16px] font-bold" :class="getColorClass(week.weekTrigger)">
                                        {{ week.weekTrigger }}
                                    </span>
                                    <span v-else class="text-xs text-gray-300 font-mono">-</span>
                                </div>
                            </template>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, watch } = Vue;

        createApp({
            setup() {
                const currentView = ref('date'); 
                const loading = ref(true);
                const allData = ref([]); 
                
                const todayStr = new Date().toISOString().split('T')[0];
                const currentMonthStr = todayStr.substring(0, 7);
                
                // 默认选择最新200条
                const selectedDate = ref('latest');
                const selectedMonth = ref(currentMonthStr);
                const selectedEtf = ref('');

                // 提取唯一日期供下拉框选择
                const uniqueDates = computed(() => {
                    const dates = allData.value.map(item => item.date);
                    return [...new Set(dates)].sort((a, b) => b.localeCompare(a)); // 倒序
                });

                const fetchData = async () => {
                    try {
                        loading.value = true;
                        const response = await fetch('https://etf.hahagw.eu.org/');
                        if (response.ok) {
                            allData.value = await response.json();
                        }
                    } catch (error) {
                        console.error('API 读取失败');
                        allData.value = [];
                    } finally {
                        loading.value = false;
                        // 数据加载完毕后，自动把 "按ETF查询" 的默认值设为 "按日期查询" 的第一条ETF
                        if (filteredDateData.value.length > 0) {
                            selectedEtf.value = filteredDateData.value[0].etf_code;
                        } else if (uniqueEtfCodes.value.length > 0) {
                            selectedEtf.value = uniqueEtfCodes.value[0];
                        }
                    }
                };

                // 解析涨跌幅数值用于排序
                const parseVal = (str) => {
                    if (!str || str === '--' || str === '-') return -9999;
                    return parseFloat(str.replace(/[^0-9.-]/g, ''));
                };

                // 计算一条记录中有几个有效数据
                const countData = (item) => {
                    return (item.am_status ? 1 : 0) + (item.pm_status ? 1 : 0) + (item.day_status ? 1 : 0) + (item.week_status ? 1 : 0);
                };

                // 获取一条记录中的最大数值
                const getMaxVal = (item) => {
                    const vals = [item.am_status, item.pm_status, item.day_status, item.week_status]
                        .filter(v => v)
                        .map(v => parseVal(v));
                    return vals.length > 0 ? Math.max(...vals) : -9999;
                };

                // 核心：多维排序与过滤计算属性
                const filteredDateData = computed(() => {
                    let baseData = [];
                    
                    if (selectedDate.value === 'latest') {
                        // 最新模式下，读取全部数据
                        baseData = allData.value;
                    } else {
                        // 特定日期下，只过滤该日期
                        baseData = allData.value.filter(item => item.date === selectedDate.value);
                    }

                    // 1. 剔除没有任何数据的空行
                    let validItems = baseData.filter(item => countData(item) > 0);

                    // 2. 排序规则：数据数量多优先 -> 最大数值大优先
                    validItems.sort((a, b) => {
                        const countDiff = countData(b) - countData(a);
                        if (countDiff !== 0) return countDiff;
                        
                        return getMaxVal(b) - getMaxVal(a);
                    });

                    // 3. 如果是查看最新，截取前 200 条
                    if (selectedDate.value === 'latest') {
                        return validItems.slice(0, 200);
                    }
                    return validItems;
                });

                const uniqueEtfCodes = computed(() => {
                    const codes = allData.value.map(item => item.etf_code);
                    return [...new Set(codes)];
                });

                const getEtfName = (code) => {
                    const found = allData.value.find(item => item.etf_code === code);
                    return found ? found.etf_name : code;
                };

                const getColorClass = (status) => {
                    if (!status || status === '-' || status === '--') return 'text-slate-300';
                    return status.includes('+') ? 'text-red-600' : 'text-green-600';
                };

                const calendarWeeks = computed(() => {
                    if (!selectedMonth.value || !selectedEtf.value) return [];
                    const [year, month] = selectedMonth.value.split('-').map(Number);
                    const totalDays = new Date(year, month, 0).getDate();
                    
                    const etfMonthData = allData.value.filter(item => {
                        return item.etf_code === selectedEtf.value && item.date.startsWith(selectedMonth.value);
                    });

                    let weeks = [];
                    let currentWeekDays = [];
                    let currentWeekTrigger = null; 

                    for (let day = 1; day <= totalDays; day++) {
                        const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                        const dateObj = new Date(year, month - 1, day);
                        const dayOfWeek = dateObj.getDay(); 

                        if (dayOfWeek === 0 || dayOfWeek === 6) {
                            if (dayOfWeek === 6 && currentWeekDays.length > 0) {
                                while (currentWeekDays.length < 5) currentWeekDays.unshift({ dayNum: '', date: null, data: {}, hasTrigger: false });
                                weeks.push({ days: currentWeekDays, weekTrigger: currentWeekTrigger });
                                currentWeekDays = [];
                                currentWeekTrigger = null;
                            }
                            continue;
                        }

                        const dayData = etfMonthData.find(item => item.date === dateStr) || { am_status: null, pm_status: null, day_status: null, week_status: null };
                        const hasTrigger = !!(dayData.am_status || dayData.pm_status || dayData.day_status);
                        
                        if (dayData.week_status) currentWeekTrigger = dayData.week_status;

                        currentWeekDays.push({ dayNum: day, date: dateStr, data: dayData, hasTrigger: hasTrigger });

                        if (dayOfWeek === 5) {
                            while (currentWeekDays.length < 5) currentWeekDays.unshift({ dayNum: '', date: null, data: {}, hasTrigger: false });
                            weeks.push({ days: currentWeekDays, weekTrigger: currentWeekTrigger });
                            currentWeekDays = [];
                            currentWeekTrigger = null;
                        }
                    }

                    if (currentWeekDays.length > 0) {
                        while (currentWeekDays.length < 5) currentWeekDays.push({ dayNum: '', date: null, data: {}, hasTrigger: false });
                        weeks.push({ days: currentWeekDays, weekTrigger: currentWeekTrigger });
                    }
                    return weeks;
                });

                onMounted(() => {
                    fetchData();
                });

                return {
                    currentView,
                    loading,
                    selectedDate,
                    selectedMonth,
                    selectedEtf,
                    uniqueDates,
                    filteredDateData,
                    uniqueEtfCodes,
                    getEtfName,
                    getColorClass,
                    calendarWeeks
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
