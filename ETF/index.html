<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF涨跌幅实时监控</title>
    <!-- 使用更稳定的 Tailwind 静态 CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        [v-cloak] { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div id="app" v-cloak>
        <header class="bg-slate-800 text-white shadow-md sticky top-0 z-50">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <h1 class="text-lg font-bold flex items-center gap-2">
                    <i class="fa-solid fa-chart-line text-emerald-400"></i> ETF涨跌幅实时监控
                </h1>
                <span class="text-xs bg-emerald-600 px-2 py-1 rounded font-mono animate-pulse">● LIVE同步中</span>
            </div>
        </header>

        <main class="container mx-auto px-2 md:px-4 py-4 md:py-6 max-w-5xl">
            
            <div v-if="loading" class="text-center py-12 text-gray-500">
                <i class="fa-solid fa-spinner animate-spin mr-2"></i> 正在读取最新数据...
            </div>

            <div v-else class="space-y-4">
                
                <!-- 自定义高级日历下拉筛选器 -->
                <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 relative">
                    <!-- 触发按钮 -->
                    <button @click.stop="toggleDropdown" class="w-full flex items-center justify-between border border-gray-300 rounded-lg px-4 py-2.5 bg-gray-50 text-sm font-semibold hover:bg-gray-100 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <span class="flex items-center gap-2">
                            <span v-if="selectedDate === 'latest'">🔥 最新触发记录</span>
                            <span v-else>📅 指定日期：{{ selectedDate }}</span>
                        </span>
                        <i class="fa-solid fa-chevron-down text-gray-400 transition-transform duration-200" :class="{'rotate-180': showDropdown}"></i>
                    </button>

                    <!-- 下拉弹窗面板 -->
                    <div v-if="showDropdown" @click.stop class="absolute left-3 right-3 mt-2 bg-white border border-gray-200 rounded-xl shadow-xl z-50 p-4 max-w-sm mx-auto md:left-3 md:right-auto md:w-80">
                        <!-- 快速选项 -->
                        <button @click="selectLatest" class="w-full text-left px-3 py-2 text-sm font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg mb-3 flex items-center gap-2 transition-colors">
                            🔥 最新触发记录
                        </button>

                        <div class="border-t border-gray-100 my-2 pt-2">
                            <!-- 日历头部月份切换 -->
                            <div class="flex items-center justify-between mb-3">
                                <button @click="prevMonth" :disabled="isPrevMonthDisabled" class="p-1 px-2 text-gray-600 hover:bg-gray-100 rounded disabled:opacity-20 disabled:hover:bg-transparent">
                                    <i class="fa-solid fa-chevron-left text-xs"></i>
                                </button>
                                <span class="text-sm font-bold text-slate-700 font-mono">{{ currentYear }}年{{ currentMonth + 1 }}月</span>
                                <button @click="nextMonth" :disabled="isNextMonthDisabled" class="p-1 px-2 text-gray-600 hover:bg-gray-100 rounded disabled:opacity-20 disabled:hover:bg-transparent">
                                    <i class="fa-solid fa-chevron-right text-xs"></i>
                                </button>
                            </div>

                            <!-- 星期表头 -->
                            <div class="grid grid-cols-7 gap-1 text-center text-xs font-bold text-gray-400 mb-1">
                                <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                            </div>

                            <!-- 日历天数格子 -->
                            <div class="grid grid-cols-7 gap-1 text-center">
                                <!-- 空格占位 -->
                                <div v-for="blank in calendarBlanks" :key="'b-'+blank"></div>
                                <!-- 真实天数 -->
                                <div v-for="day in calendarDays" :key="'d-'+day.dateStr">
                                    <div v-if="day.isBeforeStart" class="h-8"></div>
                                    <button v-else
                                        @click="day.hasData && selectDate(day.dateStr)"
                                        :disabled="!day.hasData"
                                        class="w-full h-8 text-xs font-semibold rounded-lg flex items-center justify-center font-mono transition-all"
                                        :class="[
                                            day.hasData ? 'bg-emerald-50 text-emerald-700 hover:bg-emerald-500 hover:text-white font-bold cursor-pointer' : 'text-gray-300 bg-transparent cursor-not-allowed',
                                            selectedDate === day.dateStr ? '!bg-blue-600 !text-white ring-2 ring-blue-300 font-bold' : ''
                                        ]">
                                        {{ day.dayNum }}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 监控看板表格区 -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden relative max-h-[75vh]">
                    <div class="overflow-x-auto no-scrollbar max-h-[75vh]">
                        <table class="w-full text-center border-collapse whitespace-nowrap">
                            <thead class="sticky top-0 bg-slate-100 shadow-sm z-20">
                                <tr class="text-sm font-bold text-slate-700">
                                    <th class="p-3 text-left sticky left-0 bg-slate-100 z-30 shadow-[1px_0_0_0_#e2e8f0]">ETF名称</th>
                                    <th class="p-3">上午</th>
                                    <th class="p-3">下午</th>
                                    <th class="p-3">全天</th>
                                    <th class="p-3">本周</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100 text-[15px]">
                                <template v-for="item in filteredDateData" :key="item.etf_code + '_' + item.date">
                                    <!-- ETF主数据行 -->
                                    <tr class="hover:bg-blue-50/40 transition-colors cursor-pointer" @click="toggleRow(item)">
                                        <td class="p-2 md:p-3 font-bold text-gray-800 text-left sticky left-0 bg-white shadow-[1px_0_0_0_#f3f4f6] z-10">
                                            <div class="flex flex-col">
                                                <div class="flex items-center gap-1.5 flex-wrap">
                                                    <!-- 🌟 重点：这里应用了新的 getMonthlyStats 方法 -->
                                                    <span class="text-slate-900 font-bold hover:text-blue-600 transition-colors">
                                                        {{ item.etf_name }}<span class="text-blue-600 font-semibold ml-0.5 text-sm">({{ getMonthlyStats(item.etf_code, item.date) }})</span>
                                                    </span>
                                                    <i class="fa-solid text-[10px] text-gray-400 transition-transform duration-200" 
                                                       :class="expandedRowKey === item.etf_code + '_' + item.date ? 'fa-chevron-down rotate-180 text-blue-500' : 'fa-chevron-right'"></i>
                                                </div>
                                                <div class="flex items-center gap-2 mt-0.5">
                                                    <span class="text-xs text-gray-400 font-normal font-mono">{{ item.etf_code }}</span>
                                                    <span v-if="selectedDate === 'latest'" class="text-[10px] bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded font-mono">
                                                        {{ item.date.slice(5) }}
                                                    </span>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="p-2 md:p-3 font-semibold" :class="getColorClass(item.am_status)">{{ item.am_status || '-' }}</td>
                                        <td class="p-2 md:p-3 font-semibold" :class="getColorClass(item.pm_status)">{{ item.pm_status || '-' }}</td>
                                        <td class="p-2 md:p-3 font-semibold" :class="getColorClass(item.day_status)">{{ item.day_status || '-' }}</td>
                                        <td class="p-2 md:p-3 font-semibold" :class="getColorClass(item.week_status)">{{ item.week_status || '-' }}</td>
                                    </tr>
                                    
                                    <!-- 展开的当月历史明细详情行 -->
                                    <tr v-if="expandedRowKey === item.etf_code + '_' + item.date" class="bg-slate-50/60" @click.stop>
                                        <td colspan="5" class="p-3 text-left border-t border-b border-gray-100">
                                            <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-inner max-w-3xl">
                                                <div class="text-xs font-bold text-slate-400 mb-2 flex items-center gap-1.5 uppercase tracking-wider">
                                                    <i class="fa-solid fa-clock-rotate-left text-blue-500"></i> {{ item.etf_name }} · 当月其他历史记录 (由新到旧)
                                                </div>
                                                <div class="space-y-2">
                                                    <template v-if="getMonthlyDetails(item.etf_code, item.date).length > 0">
                                                        <div v-for="detail in getMonthlyDetails(item.etf_code, item.date)" :key="detail.date" class="flex items-center text-sm border-b border-dashed border-gray-50 pb-1.5 last:border-0 last:pb-0">
                                                            <span class="w-18 font-medium text-slate-500 shrink-0">{{ formatChineseDate(detail.date) }}：</span>
                                                            <div class="flex items-center gap-1 flex-wrap">
                                                                <template v-for="(part, pIdx) in getDetailParts(detail)" :key="pIdx">
                                                                    <span v-if="pIdx > 0" class="text-gray-200 mx-1">|</span>
                                                                    <span :class="part.cls" class="font-semibold font-mono text-[13px] px-1.5 py-0.5 rounded">{{ part.text }}</span>
                                                                </template>
                                                            </div>
                                                        </div>
                                                    </template>
                                                    <template v-else>
                                                        <div class="text-xs text-gray-400 italic py-1">暂无当月其他历史触发记录</div>
                                                    </template>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                                <tr v-if="filteredDateData.length === 0">
                                    <td colspan="5" class="p-8 text-center text-gray-400">当前筛选条件下无触发记录</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, onUnmounted } = Vue;

        createApp({
            setup() {
                const loading = ref(true);
                const allData = ref([]); 
                const selectedDate = ref('latest');
                const expandedRowKey = ref(null); 

                const showDropdown = ref(false);
                const currentYear = ref(new Date().getFullYear());
                const currentMonth = ref(new Date().getMonth());

                const uniqueDatesSet = computed(() => {
                    const validDates = allData.value
                        .filter(item => (item.am_status || item.pm_status || item.day_status || item.week_status))
                        .map(item => item.date);
                    return new Set(validDates);
                });

                const startDateLimit = computed(() => {
                    if (allData.value.length === 0) return '';
                    const sortedDates = [...uniqueDatesSet.value].sort((a, b) => a.localeCompare(b));
                    return sortedDates[0] || '';
                });

                const endDateLimit = computed(() => {
                    if (allData.value.length === 0) return '';
                    const sortedDates = [...uniqueDatesSet.value].sort((a, b) => b.localeCompare(a));
                    return sortedDates[0] || '';
                });

                const toggleDropdown = () => {
                    showDropdown.value = !showDropdown.value;
                    if (showDropdown.value) {
                        const targetDateStr = selectedDate.value === 'latest' ? endDateLimit.value : selectedDate.value;
                        if (targetDateStr) {
                            const parts = targetDateStr.split('-');
                            currentYear.value = parseInt(parts[0], 10);
                            currentMonth.value = parseInt(parts[1], 10) - 1;
                        }
                    }
                };

                const closeDropdown = () => { showDropdown.value = false; };
                const selectLatest = () => { selectedDate.value = 'latest'; showDropdown.value = false; };
                const selectDate = (dateStr) => { selectedDate.value = dateStr; showDropdown.value = false; };

                const prevMonth = () => {
                    if (currentMonth.value === 0) { currentMonth.value = 11; currentYear.value--; } 
                    else { currentMonth.value--; }
                };
                const nextMonth = () => {
                    if (currentMonth.value === 11) { currentMonth.value = 0; currentYear.value++; } 
                    else { currentMonth.value++; }
                };

                const isPrevMonthDisabled = computed(() => {
                    if (!startDateLimit.value) return false;
                    const startLimitMonth = startDateLimit.value.substring(0, 7);
                    const currentViewMonth = `${currentYear.value}-${String(currentMonth.value + 1).padStart(2, '0')}`;
                    return currentViewMonth <= startLimitMonth;
                });
                const isNextMonthDisabled = computed(() => {
                    if (!endDateLimit.value) return false;
                    const endLimitMonth = endDateLimit.value.substring(0, 7);
                    const currentViewMonth = `${currentYear.value}-${String(currentMonth.value + 1).padStart(2, '0')}`;
                    return currentViewMonth >= endLimitMonth;
                });

                const calendarBlanks = computed(() => {
                    return new Date(currentYear.value, currentMonth.value, 1).getDay();
                });

                const calendarDays = computed(() => {
                    const daysInMonth = new Date(currentYear.value, currentMonth.value + 1, 0).getDate();
                    const daysArray = [];
                    for (let d = 1; d <= daysInMonth; d++) {
                        const dateStr = `${currentYear.value}-${String(currentMonth.value + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                        const isBeforeStart = startDateLimit.value ? (dateStr < startDateLimit.value) : false;
                        const hasData = uniqueDatesSet.value.has(dateStr);
                        daysArray.push({ dayNum: d, dateStr, hasData, isBeforeStart });
                    }
                    return daysArray;
                });

                const fetchData = async () => {
                    try {
                        loading.value = true;
                        const response = await fetch('https://etf.hahagw.eu.org/');
                        if (response.ok) {
                            allData.value = await response.json();
                        }
                    } catch (error) {
                        console.error('API 读取失败');
                        allData.value = [];
                    } finally {
                        loading.value = false;
                    }
                };

                const getVal = (str) => {
                    if (!str || str === '--' || str === '-') return null;
                    const num = parseFloat(str.replace(/[^0-9.-]/g, ''));
                    return isNaN(num) ? null : num;
                };

                const getHalfVal = (item) => {
                    const am = getVal(item.am_status);
                    const pm = getVal(item.pm_status);
                    if (am !== null && pm !== null) return Math.max(am, pm);
                    if (am !== null) return am;
                    if (pm !== null) return pm;
                    return null;
                };

                const countData = (item) => {
                    return (item.am_status ? 1 : 0) + (item.pm_status ? 1 : 0) + (item.day_status ? 1 : 0) + (item.week_status ? 1 : 0);
                };

                const filteredDateData = computed(() => {
                    let baseData = [];
                    if (selectedDate.value === 'latest') {
                        const latestDate = endDateLimit.value;
                        baseData = allData.value.filter(item => item.date === latestDate);
                    } else {
                        baseData = allData.value.filter(item => item.date === selectedDate.value);
                    }

                    let validItems = baseData.filter(item => countData(item) > 0);

                    validItems.sort((a, b) => {
                        const dateDiff = b.date.localeCompare(a.date);
                        if (dateDiff !== 0) return dateDiff;

                        const aWeek = getVal(a.week_status);
                        const bWeek = getVal(b.week_status);
                        if (aWeek !== null && bWeek !== null) {
                            if (aWeek !== bWeek) return bWeek - aWeek;
                        } else if (aWeek !== null) return -1;
                        else if (bWeek !== null) return 1;

                        const aDay = getVal(a.day_status);
                        const bDay = getVal(b.day_status);
                        if (aDay !== null && bDay !== null) {
                            if (aDay !== bDay) return bDay - aDay;
                        } else if (aDay !== null) return -1;
                        else if (bDay !== null) return 1;

                        const aHalf = getHalfVal(a);
                        const bHalf = getHalfVal(b);
                        if (aHalf !== null && bHalf !== null) {
                            if (aHalf !== bHalf) return bHalf - aHalf;
                        } else if (aHalf !== null) return -1;
                        else if (bHalf !== null) return 1;

                        return 0;
                    });

                    return validItems;
                });

                const getColorClass = (status) => {
                    if (!status || status === '-' || status === '--') return 'text-slate-300';
                    if (status.includes('+')) return 'text-red-600';
                    if (status.includes('-')) return 'text-green-600';
                    return 'text-gray-500';
                };

                const toggleRow = (item) => {
                    const key = item.etf_code + '_' + item.date;
                    expandedRowKey.value = expandedRowKey.value === key ? null : key;
                };

                // 🌟 新增的统计方法：计算 ⬆ 和 ⬇
                const getMonthlyStats = (etf_code, dateStr) => {
                    if (!dateStr) return '⬆0⬇0';
                    const month = dateStr.substring(0, 7);
                    let upCount = 0;
                    let downCount = 0;

                    allData.value.forEach(item => {
                        if (item.etf_code === etf_code && item.date.startsWith(month)) {
                            const statuses = [item.am_status, item.pm_status, item.day_status, item.week_status];
                            statuses.forEach(status => {
                                if (status && status !== '-' && status !== '--') {
                                    if (status.includes('+')) {
                                        upCount++;
                                    } else if (status.includes('-')) {
                                        downCount++;
                                    }
                                }
                            });
                        }
                    });
                    return `⬆${upCount}⬇${downCount}`;
                };

                const getMonthlyDetails = (etf_code, dateStr) => {
                    if (!dateStr) return [];
                    const month = dateStr.substring(0, 7);
                    return allData.value
                        .filter(item => item.etf_code === etf_code && item.date.startsWith(month) && item.date !== dateStr && countData(item) > 0)
                        .sort((a, b) => b.date.localeCompare(a.date));
                };

                const formatChineseDate = (dateStr) => {
                    if (!dateStr) return '';
                    const parts = dateStr.split('-');
                    if (parts.length === 3) {
                        return `${parseInt(parts[1], 10)}月${parseInt(parts[2], 10)}日`;
                    }
                    return dateStr;
                };

                const getDetailParts = (detailItem) => {
                    const raw = [
                        { status: detailItem.am_status, prefix: '上' },
                        { status: detailItem.pm_status, prefix: '下' },
                        { status: detailItem.day_status, prefix: '日' },
                        { status: detailItem.week_status, prefix: '周' }
                    ];
                    
                    const parts = raw.map(r => {
                        if (!r.status || r.status === '-' || r.status === '--') {
                            return { text: '--', cls: 'text-gray-300' };
                        }
                        let cls = 'text-gray-500 bg-gray-50';
                        if (r.status.includes('+')) cls = 'text-red-600 bg-red-50';
                        else if (r.status.includes('-')) cls = 'text-green-600 bg-green-50';
                        
                        return { text: `${r.prefix}${r.status}`, cls };
                    });
                    
                    while (parts.length > 0 && parts[parts.length - 1].text === '--') {
                        parts.pop();
                    }
                    return parts;
                };

                onMounted(() => {
                    fetchData();
                    window.addEventListener('click', closeDropdown);
                });

                onUnmounted(() => {
                    window.removeEventListener('click', closeDropdown);
                });

                return {
                    loading, selectedDate, filteredDateData,
                    getColorClass, expandedRowKey, toggleRow,
                    getMonthlyStats, // 🌟 暴露新的方法
                    getMonthlyDetails, formatChineseDate, getDetailParts,
                    showDropdown, currentYear, currentMonth, calendarBlanks, calendarDays,
                    isPrevMonthDisabled, isNextMonthDisabled, toggleDropdown, closeDropdown,
                    selectLatest, selectDate, prevMonth, nextMonth
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
