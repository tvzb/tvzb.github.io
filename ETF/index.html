<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 策略复盘看板</title>
    <style>
        :root {
            --bg-dark: #121212; --bg-panel: #1e1e1e; --text-main: #e0e0e0;
            --text-muted: #888; --accent: #4caf50; --border: #333;
        }
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* 左侧侧边栏 */
        #sidebar { width: 260px; background: var(--bg-panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 20px 0; }
        .side-title { padding: 0 20px 15px; font-size: 18px; font-weight: bold; color: var(--accent); border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .year-btn { width: 100%; background: none; border: none; color: white; padding: 12px 20px; text-align: left; font-size: 16px; cursor: pointer; display: flex; justify-content: space-between; }
        .year-btn:hover { background: rgba(255,255,255,0.05); }
        .month-list { display: none; background: #181818; }
        .month-btn { width: 100%; background: none; border: none; color: var(--text-muted); padding: 10px 20px 10px 40px; text-align: left; cursor: pointer; transition: 0.2s; }
        .month-btn:hover, .month-btn.active { color: var(--accent); background: rgba(76, 175, 80, 0.1); }

        /* 右侧主内容 */
        #main { flex: 1; padding: 30px; overflow-y: auto; }
        .header { margin-bottom: 30px; }
        .header h1 { margin: 0 0 5px 0; font-size: 24px; }
        .header p { margin: 0; color: var(--text-muted); }
        
        /* 每日区块 */
        .day-card { background: var(--bg-panel); border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border); }
        .day-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 16px; }
        .day-header:hover { background: rgba(255,255,255,0.02); }
        .badge { background: #333; padding: 3px 8px; border-radius: 12px; font-size: 12px; color: var(--text-muted); }
        
        /* 信号内容 */
        .signals { display: none; padding: 0 20px 15px; border-top: 1px solid var(--border); margin-top: 10px; padding-top: 15px; }
        .signal-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px dashed #333; }
        .signal-item:last-child { border-bottom: none; padding-bottom: 0; }
        .signal-time { font-family: monospace; color: var(--text-muted); margin-right: 15px; font-size: 14px; }
        
        .loading { text-align: center; color: var(--text-muted); margin-top: 50px; font-size: 16px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="side-title">📈 监控时间轴</div>
        <div id="nav-container"></div>
    </div>

    <div id="main">
        <div class="header">
            <h1 id="current-title">请在左侧选择时间</h1>
            <p>基于北京时间 (UTC+8) 触发的策略历史记录</p>
        </div>
        <div id="content-container"></div>
    </div>

    <script>
        // 【重要】填入你的 Cloudflare Worker API 地址
        const API_URL = "https://etf-api.hahagw2016.workers.dev";
        
        let globalData = {}; // 结构: { "2024": { "10": { "28": [信号1, 信号2] } } }

        async function init() {
            document.getElementById('content-container').innerHTML = '<div class="loading">正在从数据库拉取信号...⏳</div>';
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                processData(data);
                renderSidebar();
            } catch (e) {
                document.getElementById('content-container').innerHTML = `<div class="loading" style="color:red">数据加载失败: ${e.message}</div>`;
            }
        }

        // 把数据库的扁平数组，组装成 年 -> 月 -> 日 结构
        function processData(data) {
            globalData = {};
            data.forEach(item => {
                // bj_time 格式: "2024-10-28 11:32:05"
                const [datePart, timePart] = item.bj_time.split(' ');
                const [y, m, d] = datePart.split('-');
                
                if (!globalData[y]) globalData[y] = {};
                if (!globalData[y][m]) globalData[y][m] = {};
                if (!globalData[y][m][d]) globalData[y][m][d] = [];
                
                globalData[y][m][d].push({ time: timePart, text: item.signal_text });
            });
        }

        // 渲染左侧手风琴菜单
        function renderSidebar() {
            const container = document.getElementById('nav-container');
            container.innerHTML = '';
            
            // 年份倒序排列
            const years = Object.keys(globalData).sort().reverse();
            years.forEach(y => {
                // 生成年份按钮
                const yBtn = document.createElement('button');
                yBtn.className = 'year-btn';
                yBtn.innerHTML = `<span>${y} 年</span> <span>▾</span>`;
                
                // 生成月份容器
                const mList = document.createElement('div');
                mList.className = 'month-list';
                
                const months = Object.keys(globalData[y]).sort().reverse();
                months.forEach(m => {
                    const mBtn = document.createElement('button');
                    mBtn.className = 'month-btn';
                    mBtn.innerText = `${parseInt(m)} 月`;
                    mBtn.onclick = () => {
                        document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
                        mBtn.classList.add('active');
                        renderMain(y, m);
                    };
                    mList.appendChild(mBtn);
                });

                // 点击展开/收缩年份
                yBtn.onclick = () => {
                    const isOpen = mList.style.display === 'block';
                    mList.style.display = isOpen ? 'none' : 'block';
                    yBtn.innerHTML = `<span>${y} 年</span> <span>${isOpen ? '▾' : '▴'}</span>`;
                };

                container.appendChild(yBtn);
                container.appendChild(mList);
            });

            document.getElementById('content-container').innerHTML = '<div class="loading">👈 请在左侧选择要复盘的月份</div>';
        }

        // 渲染右侧某个月份的内容
        function renderMain(year, month) {
            document.getElementById('current-title').innerText = `${year}年 ${parseInt(month)}月 复盘记录`;
            const container = document.getElementById('content-container');
            container.innerHTML = '';

            const daysData = globalData[year][month];
            const days = Object.keys(daysData).sort().reverse(); // 日期从大到小 (30日, 29日...)

            days.forEach(d => {
                const signals = daysData[d];
                
                const card = document.createElement('div');
                card.className = 'day-card';
                
                // 天数 Header
                const header = document.createElement('div');
                header.className = 'day-header';
                header.innerHTML = `<span>📅 ${d} 日</span> <span class="badge">${signals.length} 条触发</span>`;
                
                // 信号列表 Body
                const body = document.createElement('div');
                body.className = 'signals';
                
                signals.forEach(sig => {
                    const row = document.createElement('div');
                    row.className = 'signal-item';
                    row.innerHTML = `<span class="signal-time">${sig.time}</span> <span class="signal-txt">${sig.text}</span>`;
                    body.appendChild(row);
                });

                // 点击展开闭合卡片
                header.onclick = () => {
                    body.style.display = (body.style.display === 'block') ? 'none' : 'block';
                };

                card.appendChild(header);
                card.appendChild(body);
                container.appendChild(card);
            });
        }

        // 启动
        init();
    </script>
</body>
</html>
