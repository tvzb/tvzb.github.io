<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股ETF阈值监控看板</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        [v-cloak] { display: none; }
        
        /* 隐藏滚动条但保留滚动功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div id="app" v-cloak>
        <header class="bg-slate-800 text-white shadow-md sticky top-0 z-50">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <h1 class="text-lg font-bold flex items-center gap-2">
                    <i class="fa-solid fa-chart-line text-emerald-400"></i> ETF阈值监控系统
                </h1>
                <span class="text-xs bg-emerald-600 px-2 py-1 rounded font-mono animate-pulse">● LIVE同步中</span>
            </div>
        </header>

        <main class="container mx-auto px-2 md:px-4 py-4 md:py-6 max-w-5xl">
            
            <div v-if="loading" class="text-center py-12 text-gray-500">
                <i class="fa-solid fa-spinner animate-spin mr-2"></i> 正在读取最新数据...
            </div>

            <div v-else class="space-y-4">
                <!-- 日期筛选器（默认展示最新200条触发记录） -->
                <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex gap-4 items-center">
                    <div class="flex-1 w-full">
                        <select v-model="selectedDate" class="w-full border border-gray-300 rounded-lg px-3 py-2 bg-gray-50 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="latest">🔥 默认展示：最新200条触发记录</option>
                            <option v-for="date in uniqueDates" :key="date" :value="date">
                                📅 指定日期：{{ date }}
                            </option>
                        </select>
                    </div>
                </div>

                <!-- 监控看板表格区 -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden relative max-h-[75vh]">
                    <div class="overflow-x-auto no-scrollbar max-h-[75vh]">
                        <table class="w-full text-center border-collapse whitespace-nowrap">
                            <thead class="sticky top-0 bg-slate-100 shadow-sm z-20">
                                <tr class="text-sm font-bold text-slate-700">
                                    <th class="p-3 text-left sticky left-0 bg-slate-100 z-30 shadow-[1px_0_0_0_#e2e8f0]">ETF名称</th>
                                    <th class="p-3">上午</th>
                                    <th class="p-3">下午</th>
                                    <th class="p-3">全天</th>
                                    <th class="p-3">本周</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100 text-[15px]">
                                <template v-for="item in filteredDateData" :key="item.etf_code + '_' + item.date">
                                    <!-- ETF主数据行：整行可点击切换展开/折叠 -->
                                    <tr class="hover:bg-blue-50/40 transition-colors cursor-pointer" @click="toggleRow(item)">
                                        <td class="p-3 font-bold text-gray-800 text-left sticky left-0 bg-white shadow-[1px_0_0_0_#f3f4f6] z-10">
                                            <div class="flex items-center justify-between gap-3">
                                                <div class="flex flex-col">
                                                    <span class="text-slate-900 font-bold hover:text-blue-600 transition-colors">
                                                        {{ item.etf_name }}（{{ getMonthlyCount(item.etf_code, item.date) }}条）
                                                    </span>
                                                    <div class="flex items-center gap-2 mt-0.5">
                                                        <span class="text-xs text-gray-400 font-normal">{{ item.etf_code }}</span>
                                                        <span v-if="selectedDate === 'latest'" class="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded">
                                                            {{ item.date.slice(5) }}
                                                        </span>
                                                    </div>
                                                </div>
                                                <!-- 展开/折叠的小箭头指示器 -->
                                                <i class="fa-solid text-xs text-gray-400 transition-transform duration-200" 
                                                   :class="expandedRowKey === item.etf_code + '_' + item.date ? 'fa-chevron-down rotate-180 text-blue-500' : 'fa-chevron-right'"></i>
                                            </div>
                                        </td>
                                        <td class="p-3 font-semibold" :class="getColorClass(item.am_status)">{{ item.am_status || '-' }}</td>
                                        <td class="p-3 font-semibold" :class="getColorClass(item.pm_status)">{{ item.pm_status || '-' }}</td>
                                        <td class="p-3 font-semibold" :class="getColorClass(item.day_status)">{{ item.day_status || '-' }}</td>
                                        <td class="p-3 font-semibold" :class="getColorClass(item.week_status)">{{ item.week_status || '-' }}</td>
                                    </tr>
                                    
                                    <!-- 展开的当月历史明细详情行 -->
                                    <tr v-if="expandedRowKey === item.etf_code + '_' + item.date" class="bg-slate-50/60" @click.stop>
                                        <td colspan="5" class="p-4 text-left border-t border-b border-gray-100">
                                            <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-inner max-w-3xl">
                                                <div class="text-xs font-bold text-slate-400 mb-2.5 flex items-center gap-1.5 uppercase tracking-wider">
                                                    <i class="fa-solid fa-clock-rotate-left text-blue-500"></i> {{ item.etf_name }} · 当月触发历史详情 (由新到旧)
                                                </div>
                                                <div class="space-y-2">
                                                    <div v-for="detail in getMonthlyDetails(item.etf_code, item.date)" :key="detail.date" class="flex items-center text-sm border-b border-dashed border-gray-50 pb-1.5 last:border-0 last:pb-0">
                                                        <!-- 日期显示（X月X日：） -->
                                                        <span class="w-20 font-medium text-slate-500 font-sans shrink-0">{{ formatChineseDate(detail.date) }}：</span>
                                                        <!-- 上、下、日、周明细拼接 -->
                                                        <div class="flex items-center gap-1 flex-wrap">
                                                            <template v-for="(part, pIdx) in getDetailParts(detail)" :key="pIdx">
                                                                <span v-if="pIdx > 0" class="text-gray-200 mx-1">|</span>
                                                                <span :class="part.cls" class="font-semibold font-mono text-[13px] px-1.5 py-0.5 rounded">{{ part.text }}</span>
                                                            </template>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                                <tr v-if="filteredDateData.length === 0">
                                    <td colspan="5" class="p-8 text-center text-gray-400">当前筛选条件下无触发记录</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const loading = ref(true);
                const allData = ref([]); 
                const selectedDate = ref('latest');
                const expandedRowKey = ref(null); // 用于记录当前哪个 ETF 的哪天记录处于展开状态

                // 提取唯一日期供下拉框选择
                const uniqueDates = computed(() => {
                    const dates = allData.value.map(item => item.date);
                    return [...new Set(dates)].sort((a, b) => b.localeCompare(a));
                });

                // 获取数据源
                const fetchData = async () => {
                    try {
                        loading.value = true;
                        const response = await fetch('https://etf.hahagw.eu.org/');
                        if (response.ok) {
                            allData.value = await response.json();
                        }
                    } catch (error) {
                        console.error('API 读取失败');
                        allData.value = [];
                    } finally {
                        loading.value = false;
                    }
                };

                // 解析涨跌幅数值用于排序
                const parseVal = (str) => {
                    if (!str || str === '--' || str === '-') return -9999;
                    return parseFloat(str.replace(/[^0-9.-]/g, ''));
                };

                // 计算有效数据段数量
                const countData = (item) => {
                    return (item.am_status ? 1 : 0) + (item.pm_status ? 1 : 0) + (item.day_status ? 1 : 0) + (item.week_status ? 1 : 0);
                };

                // 获取最大数值
                const getMaxVal = (item) => {
                    const vals = [item.am_status, item.pm_status, item.day_status, item.week_status]
                        .filter(v => v)
                        .map(v => parseVal(v));
                    return vals.length > 0 ? Math.max(...vals) : -9999;
                };

                // 默认展示最新200条核心逻辑（保持原排序规则不变）
                const filteredDateData = computed(() => {
                    let baseData = [];
                    if (selectedDate.value === 'latest') {
                        baseData = allData.value;
                    } else {
                        baseData = allData.value.filter(item => item.date === selectedDate.value);
                    }

                    let validItems = baseData.filter(item => countData(item) > 0);

                    validItems.sort((a, b) => {
                        const countDiff = countData(b) - countData(a);
                        if (countDiff !== 0) return countDiff;
                        return getMaxVal(b) - getMaxVal(a);
                    });

                    if (selectedDate.value === 'latest') {
                        return validItems.slice(0, 200);
                    }
                    return validItems;
                });

                // 涨红跌绿样式控制
                const getColorClass = (status) => {
                    if (!status || status === '-' || status === '--') return 'text-slate-300';
                    return status.includes('+') ? 'text-red-600' : 'text-green-600';
                };

                // 切换行展开/折叠状态
                const toggleRow = (item) => {
                    const key = item.etf_code + '_' + item.date;
                    expandedRowKey.value = expandedRowKey.value === key ? null : key;
                };

                // 【核心新功能 1】动态计算该 ETF 在该数据行对应月份的累积触发条数
                const getMonthlyCount = (etf_code, dateStr) => {
                    if (!dateStr) return 0;
                    const month = dateStr.substring(0, 7); // 截取出 YYYY-MM
                    return allData.value.filter(item => 
                        item.etf_code === etf_code && 
                        item.date.startsWith(month) && 
                        countData(item) > 0
                    ).length;
                };

                // 【核心新功能 2】获取该 ETF 在当月的所有触发历史记录，并按时间由新到旧排序
                const getMonthlyDetails = (etf_code, dateStr) => {
                    if (!dateStr) return [];
                    const month = dateStr.substring(0, 7);
                    return allData.value
                        .filter(item => item.etf_code === etf_code && item.date.startsWith(month) && countData(item) > 0)
                        .sort((a, b) => b.date.localeCompare(a.date)); // 时间由新到旧排序
                };

                // 格式化日期：将 "2026-07-08" 转换为 "7月8日"
                const formatChineseDate = (dateStr) => {
                    if (!dateStr) return '';
                    const parts = dateStr.split('-');
                    if (parts.length === 3) {
                        return `${parseInt(parts[1], 10)}月${parseInt(parts[2], 10)}日`;
                    }
                    return dateStr;
                };

                // 【精准格式化明细】按需求生成带有 "上/下/日/周" 前缀的多维状态，并自动裁切末尾空项
                const getDetailParts = (detailItem) => {
                    const raw = [
                        { status: detailItem.am_status, prefix: '上' },
                        { status: detailItem.pm_status, prefix: '下' },
                        { status: detailItem.day_status, prefix: '日' },
                        { status: detailItem.week_status, prefix: '周' }
                    ];
                    
                    const parts = raw.map(r => {
                        if (!r.status || r.status === '-' || r.status === '--') {
                            return { text: '--', cls: 'text-gray-300' };
                        }
                        // 延续主表红绿配色，增强明细的可读性
                        const cls = r.status.includes('+') ? 'text-red-600 bg-red-50' : 'text-green-600 bg-green-50';
                        return { text: `${r.prefix}${r.status}`, cls };
                    });
                    
                    // 裁切尾部连续的空白项（例如：上xxx | -- | 日xxx | --  自动裁剪为  上xxx | -- | 日xxx ）
                    while (parts.length > 0 && parts[parts.length - 1].text === '--') {
                        parts.pop();
                    }
                    return parts;
                };

                onMounted(() => {
                    fetchData();
                });

                return {
                    loading,
                    selectedDate,
                    uniqueDates,
                    filteredDateData,
                    getColorClass,
                    expandedRowKey,
                    toggleRow,
                    getMonthlyCount,
                    getMonthlyDetails,
                    formatChineseDate,
                    getDetailParts
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
