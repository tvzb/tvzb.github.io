<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片墙展示</title>
    <style>
        /* 页面基础设置 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        /* 响应式照片网格布局 */
        .gallery {
            display: grid;
            /* 自动排列，每张照片最小宽度 250px */
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 单张照片的样式 */
        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover; /* 保证照片填满区域且不变形 */
            border-radius: 12px; /* 圆角效果 */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* 添加阴影 */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* 鼠标悬停时的浮动放大效果 */
        .gallery img:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <h1>截图显示</h1>
    
    <div class="gallery">
        <img src="baokao/1.jpg" alt="照片 1">
        <img src="baokao/2.jpg" alt="照片 2">
        <img src="baokao/3.jpg" alt="照片 3">
        <img src="baokao/4.jpg" alt="照片 4">
        <img src="baokao/5.jpg" alt="照片 5">
        <img src="baokao/6.jpg" alt="照片 6">
        <img src="baokao/7.jpg" alt="照片 7">
        <img src="baokao/8.jpg" alt="照片 8">
        <img src="baokao/9.jpg" alt="照片 9">
        <img src="baokao/10.jpg" alt="照片 10">
        <img src="baokao/11.jpg" alt="照片 11">
        <img src="baokao/12.jpg" alt="照片 12">
        <img src="baokao/13.jpg" alt="照片 13">
        <img src="baokao/14.jpg" alt="照片 14">
        <img src="baokao/15.jpg" alt="照片 15">
        <img src="baokao/16.jpg" alt="照片 16">
        <img src="baokao/17.jpg" alt="照片 17">
        <img src="baokao/18.jpg" alt="照片 18">
    </div>

</body>
</html>
