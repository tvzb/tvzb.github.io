<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>直播源智能处理专家</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg-color: #f3f4f6;
      --panel-bg: rgba(255, 255, 255, 0.85);
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
    }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
      margin: 0; padding: 20px; 
      background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
      min-height: 100vh; 
      color: var(--text-main); 
      box-sizing: border-box;
    }
    
    .container { 
      max-width: 1400px; 
      margin: 0 auto; 
      background: var(--panel-bg); 
      border-radius: 20px; 
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08); 
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden; 
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 30px 30px 15px 30px;
      text-align: center;
    }

    h1 { margin: 0 0 10px 0; font-size: 28px; color: #111827; letter-spacing: 1px; }
    .subtitle { margin: 0; color: var(--text-muted); font-size: 15px; }

    /* 恢复并美化的导航栏样式 */
    nav { 
      padding: 0 30px 20px 30px; 
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    nav ul { 
      list-style: none; 
      padding: 0; 
      margin: 0; 
      display: flex; 
      justify-content: center; 
      flex-wrap: wrap; 
      gap: 12px; 
    }
    nav a { 
      display: block; 
      padding: 10px 20px; 
      background: rgba(255, 255, 255, 0.5); 
      color: var(--text-muted); 
      text-decoration: none; 
      font-size: 15px; 
      font-weight: 600; 
      border-radius: 12px; 
      transition: all 0.3s ease; 
      border: 1px solid transparent;
    }
    nav a:hover { 
      background: rgba(255, 255, 255, 0.9); 
      color: var(--primary);
      transform: translateY(-2px);
      border-color: rgba(79, 70, 229, 0.2);
    }
    nav a.active { 
      background: var(--primary); 
      color: white; 
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); 
    }

    .tips-box { 
      margin: 20px 30px; 
      background: rgba(245, 158, 11, 0.1); 
      border-left: 4px solid #f59e0b; 
      padding: 15px 20px; 
      border-radius: 8px; 
      font-size: 14px; 
      color: #b45309; 
      line-height: 1.6;
    }

    .workspace {
      display: flex;
      gap: 20px;
      padding: 0 30px 30px 30px;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .panel h3 { margin: 0; font-size: 16px; color: #374151; display: flex; justify-content: space-between; align-items: center;}
    
    textarea { 
      width: 100%; 
      height: 450px; 
      padding: 16px; 
      border: 2px solid var(--border); 
      border-radius: 12px; 
      font-family: 'Consolas', 'Monaco', monospace; 
      font-size: 14px; 
      box-sizing: border-box; 
      transition: all 0.3s ease; 
      resize: vertical;
      background: rgba(255,255,255,0.9);
      line-height: 1.5;
    }
    
    textarea:focus { 
      border-color: var(--primary); 
      outline: none; 
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); 
    }
    
    #output { background-color: #f8fafc; }

    .btn-group { display: flex; gap: 10px; }

    button { 
      padding: 12px 24px; 
      border: none; 
      border-radius: 10px; 
      cursor: pointer; 
      font-size: 15px; 
      font-weight: 600; 
      transition: all 0.2s; 
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 6px rgba(79,70,229,0.2); }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
    
    .btn-secondary { background: #e5e7eb; color: #4b5563; }
    .btn-secondary:hover { background: #d1d5db; }
    
    .btn-success { background: #10b981; color: white; box-shadow: 0 4px 6px rgba(16,185,129,0.2);}
    .btn-success:hover { background: #059669; transform: translateY(-2px); }

    #toast {
      visibility: hidden;
      min-width: 250px;
      background-color: #333;
      color: #fff;
      text-align: center;
      border-radius: 8px;
      padding: 16px;
      position: fixed;
      z-index: 1000;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      font-size: 15px;
      opacity: 0;
      transition: opacity 0.3s, visibility 0.3s, bottom 0.3s;
    }

    #toast.show {
      visibility: visible;
      opacity: 1;
      bottom: 50px;
    }

    @media (max-width: 900px) {
      .workspace { flex-direction: column; }
      textarea { height: 300px; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>📺 直播源智能规范化专家</h1>
    <p class="subtitle">自动精简名称 · 剥离冗余参数 · 跨源镜像映射 · 智能分组去重</p>
  </header>

  <!-- 恢复的导航栏 -->
  <nav>
    <ul>
      <li><a href="#" class="active">智能处理</a></li>
      <li><a href="wzcl.html">文字处理</a></li>
      <li><a href="pdzl.html">频道整理</a></li>
      <li><a href="m2t.html">M3U↔TXT转换</a></li>
      <li><a href="szq.html">石子棋</a></li>
    </ul>
  </nav>

  <div class="tips-box">
    <strong>💡 处理规则升级：</strong><br>
    • <b>强力清理：</b>自动剔除 M3U8 链接后附带的 <code>$订阅源</code>、<code>$LR...</code> 等所有无效后缀参数。<br>
    • <b>定制排序：</b>卫视严格按照预设的32个省级行政区专属顺序排列。
  </div>

  <div class="workspace">
    <!-- 左侧输入区 -->
    <div class="panel">
      <h3>
        <span>📥 数据输入 (M3U / TXT)</span>
        <div class="btn-group">
          <button class="btn-secondary" onclick="clearAll()">清空</button>
        </div>
      </h3>
      <textarea id="input" placeholder="请在此处粘贴杂乱的 M3U 或 TXT 直播源内容..."></textarea>
      <button class="btn-primary" onclick="handleSmartProcess()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        一键智能清洗并分组
      </button>
    </div>

    <!-- 右侧输出区 -->
    <div class="panel">
      <h3>
        <span>📤 规范化结果 (TXT)</span>
      </h3>
      <textarea id="output" readonly placeholder="处理后的标准 TXT 格式结果将在此显示..."></textarea>
      <button class="btn-success" onclick="copyResult()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
        一键复制结果
      </button>
    </div>
  </div>
</div>

<!-- 吐司提示 -->
<div id="toast">复制成功！</div>

<script>
const cctvConfig = [
  { id: 1, name: "综合" }, { id: 2, name: "财经" }, { id: 3, name: "综艺" },
  { id: 4, name: "中文国际" }, { id: 5, name: "体育" }, { id: 6, name: "电影" },
  { id: 7, name: "国防军事" }, { id: 8, name: "电视剧" }, { id: 9, name: "纪录" },
  { id: 10, name: "科教" }, { id: 11, name: "戏曲" }, { id: 12, name: "社会与法" },
  { id: 13, name: "新闻" }, { id: 14, name: "少儿" }, { id: 15, name: "音乐" },
  { id: 16, name: "奥林匹克" }, { id: 17, name: "农业农村" }
];

const prioritySatellites = [
  "江西卫视", "东方卫视", "北京卫视", "浙江卫视", "江苏卫视", 
  "湖南卫视", "深圳卫视", "广东卫视", "四川卫视", "东南卫视", 
  "湖北卫视", "陕西卫视", "河南卫视", "河北卫视", "辽宁卫视", 
  "重庆卫视", "吉林卫视", "安徽卫视", "贵州卫视", "广西卫视", 
  "山东卫视", "天津卫视", "山西卫视", "黑龙江卫视", "海南卫视", 
  "云南卫视", "甘肃卫视", "内蒙古卫视", "宁夏卫视", "青海卫视", 
  "新疆卫视", "西藏卫视"
];

const provinceRegex = /^(北京|天津|上海|重庆|河北|山西|辽宁|吉林|黑龙江|江苏|浙江|安徽|福建|江西|山东|河南|湖北|湖南|广东|海南|四川|贵州|云南|陕西|甘肃|青海|内蒙古|广西|西藏|宁夏|新疆|兵团|东南|深圳|东方)卫视/;

function cleanUrl(url) {
  if (!url) return "";
  return url.split('$')[0].split('#')[0].trim();
}

function formatChannelName(name) {
  let n = name.replace(/HD|FHD|标清|超清|高清|频道|\s|\[.*\]|\(.*\)/gi, "");
  if (n === "上海卫视") return "东方卫视";
  if (n === "福建东南卫视") return "东南卫视";
  if (n.includes("卫视") && !n.endsWith("卫视")) {
      n = n.substring(0, n.indexOf("卫视") + 2);
  }
  return n;
}

function isValidSatellite(name) {
  return provinceRegex.test(name);
}

function getServerKey(url) {
  try {
    const u = new URL(url);
    return `${u.protocol}//${u.host}`;
  } catch(e) { return url.substring(0, 30); }
}

function parseUrlInfo(url, channelNum) {
  const parts = url.split('/');
  const filename = parts[parts.length - 1].split('?')[0];
  const matches = filename.match(/\d+/g);
  if (!matches) return null;
  let target = matches.find(m => parseInt(m) === channelNum) || matches[matches.length - 1];
  return {
    val: parseInt(target),
    str: target,
    len: target.length,
    prefix: url.substring(0, url.lastIndexOf(target)),
    suffix: url.substring(url.lastIndexOf(target) + target.length)
  };
}

function handleSmartProcess() {
  let rawData = document.getElementById('input').value.trim();
  if (!rawData) {
    showToast("请输入需要处理的直播源内容！");
    return;
  }

  if (rawData.includes("#EXTINF")) {
    const lines = rawData.split(/\r?\n/);
    let converted = [];
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].includes("#EXTINF")) {
        let name = lines[i].split(',')[1]?.trim();
        let url = lines[i+1]?.trim();
        if (name && url) {
          converted.push(`${name},${cleanUrl(url)}`);
        }
      }
    }
    rawData = converted.join('\n');
  }

  const lines = rawData.split('\n');
  let hostGroups = {};
  let globalOffsets = {};
  let allDetectedSats = new Set();

  lines.forEach(line => {
    if (!line.includes(',')) return;
    let [rawName, rawUrl] = line.split(',');
    let name = formatChannelName(rawName.trim());
    let url = cleanUrl(rawUrl.trim()); 
    
    const host = getServerKey(url);
    if (!hostGroups[host]) hostGroups[host] = { cctv: {}, sats: {}, masterPattern: null };

    const cctvMatch = name.match(/cctv-?(\d+)/i);
    if (cctvMatch) {
      const id = parseInt(cctvMatch[1]);
      const info = parseUrlInfo(url, id);
      hostGroups[host].cctv[id] = { url, info };
      if (!hostGroups[host].masterPattern && info) hostGroups[host].masterPattern = info;
    } else if (name.includes("卫视") && isValidSatellite(name)) {
      allDetectedSats.add(name);
      const info = parseUrlInfo(url, -1);
      hostGroups[host].sats[name] = { url, info };
      if (!hostGroups[host].masterPattern && info) hostGroups[host].masterPattern = info;
    }
  });

  Object.values(hostGroups).forEach(group => {
    const sNames = Object.keys(group.sats);
    if (sNames.length >= 2) {
      const ref = sNames[0];
      sNames.slice(1).forEach(curr => {
        if (!globalOffsets[curr] && group.sats[curr].info && group.sats[ref].info) {
          globalOffsets[curr] = { refName: ref, offset: group.sats[curr].info.val - group.sats[ref].info.val };
        }
      });
    }
  });

  let otherSats = Array.from(allDetectedSats).filter(s => !prioritySatellites.includes(s));
  otherSats.sort((a, b) => a.localeCompare(b, 'zh-CN'));
  const finalSatOrder = [...prioritySatellites, ...otherSats];

  let finalResult = [];
  let seenEntries = new Set();

  finalResult.push("央视频道,#genre#");
  Object.keys(hostGroups).forEach(host => {
    const group = hostGroups[host];
    const cctvIdsFound = Object.keys(group.cctv).map(Number);
    if (cctvIdsFound.length >= 2 && group.masterPattern) {
      cctvConfig.forEach(conf => {
        let url = group.cctv[conf.id]?.url;
        if (!url) {
          const newIdStr = conf.id.toString().padStart(group.masterPattern.len, '0');
          url = group.masterPattern.prefix + newIdStr + group.masterPattern.suffix;
        }
        const title = `CCTV-${conf.id}${conf.name}`;
        if (!seenEntries.has(title + url)) {
          finalResult.push(`${title},${url}`);
          seenEntries.add(title + url);
        }
      });
      finalResult.push("");
    } else {
      cctvIdsFound.sort((a,b)=>a-b).forEach(id => {
        const conf = cctvConfig.find(c => c.id === id);
        const title = conf ? `CCTV-${id}${conf.name}` : `CCTV-${id}`;
        if (!seenEntries.has(title + group.cctv[id].url)) {
            finalResult.push(`${title},${group.cctv[id].url}`);
            seenEntries.add(title + group.cctv[id].url);
        }
      });
    }
  });

  finalResult.push("卫视频道,#genre#");
  Object.keys(hostGroups).forEach(host => {
    const group = hostGroups[host];
    if (Object.keys(group.sats).length === 0) return;

    finalSatOrder.forEach(sName => {
      let url = group.sats[sName]?.url;
      if (!url) {
        const off = globalOffsets[sName];
        if (off && group.sats[off.refName] && group.sats[off.refName].info) {
          const refInfo = group.sats[off.refName].info;
          const targetVal = refInfo.val + off.offset;
          const targetIdStr = targetVal.toString().padStart(refInfo.len, '0');
          url = refInfo.prefix + targetIdStr + refInfo.suffix;
        }
      }
      if (url && !seenEntries.has(sName + url)) {
        finalResult.push(`${sName},${url}`);
        seenEntries.add(sName + url);
      }
    });
    finalResult.push("");
  });

  const outputStr = finalResult.join('\n').replace(/\n\n+/g, '\n\n').trim();
  document.getElementById('output').value = outputStr;
  showToast("✅ 处理完成！请在右侧查看结果。");
}

function clearAll() {
  document.getElementById('input').value = "";
  document.getElementById('output').value = "";
  showToast("已清空内容");
}

function copyResult() {
  const output = document.getElementById('output');
  if(!output.value) {
    showToast("当前没有可复制的内容！");
    return;
  }
  output.select();
  document.execCommand('copy');
  showToast("🎉 结果已成功复制到剪贴板！");
}

function showToast(message) {
  const toast = document.getElementById("toast");
  toast.innerText = message;
  toast.className = "show";
  setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
}
</script>
</body>
</html>
